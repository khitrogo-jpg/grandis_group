<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRANDIS GROUP | Эксклюзивная мебель и декор</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: rgba(212, 175, 55, 0.15);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Шапка сайта */
        header {
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(13, 13, 13, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo span {
            color: var(--gold);
        }

        /* Главный баннер */
        .hero {
            max-width: 1200px;
            margin: 40px auto 20px auto;
            padding: 0 20px;
        }

        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1600') center/cover no-repeat;
            height: 400px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-banner h1 {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .hero-banner p {
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Сетка каталога */
        .catalog-section {
            max-width: 1200px;
            margin: 40px auto 80px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            border-left: 3px solid var(--gold);
            padding-left: 15px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1max));
            gap: 30px;
        }

        /* Карточка товара */
        .product-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .image-container {
            width: 100%;
            height: 340px;
            overflow: hidden;
            background: #000;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .image-container img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-category {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-title {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .card-bottom {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.08);
        }

        .card-price {
            font-size: 20px;
            font-weight: 700;
        }

        .card-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .card-link:hover {
            color: var(--gold);
            border-color: var(--text-main);
        }

        /* Адаптивность под мобильные */
        @media (max-width: 768px) {
            .hero-banner { height: 280px; }
            .hero-banner h1 { font-size: 28px; }
            .hero-banner p { font-size: 11px; letter-spacing: 2px; }
            .products-grid { grid-template-columns: 1fr; }
            .image-container { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="index.html" class="logo">GRANDIS<span>GROUP</span></a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-banner">
                <h1>Премиальный комфорт</h1>
                <p>Европейское качество в Минске</p>
            </div>
        </section>

        <section class="catalog-section">
            <h2 class="section-title">Каталог мебели</h2>
            
            <div class="products-grid">
                <!-- Карточка товара: Кресло STRANDMON -->
                <div class="product-card">
                    <div class="image-container">
                        <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800" alt="Кресло STRANDMON">
                    </div>
                    <div class="card-info">
                        <div class="card-category">Гостиная / Мягкая мебель</div>
                        <h3 class="card-title">Кресло STRANDMON</h3>
                        <div class="card-bottom">
                            <div class="card-price">790 BYN</div>
                            <!-- Исправленная ссылка для принудительного сброса кэша на смартфонах -->
                            <a href="product-strandmon.html?v=2" class="card-link">Подробнее</a>
                        </div>
                    </div>
                </div>

                <!-- Карточка-заглушка 2 -->
                <div class="product-card">
                    <div class="image-container">
                        <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800" alt="Диван Клауд">
                    </div>
                    <div class="card-info">
                        <div class="card-category">Гостиная / Диваны</div>
                        <h3 class="card-title">Диван премиум CLOUD</h3>
                        <div class="card-bottom">
                            <div class="card-price">2450 BYN</div>
                            <a href="#" class="card-link" onclick="alert('Эта карточка находится в разработке'); return false;">Подробнее</a>
                        </div>
                    </div>
                </div>

                <!-- Карточка-заглушка 3 -->
                <div class="product-card">
                    <div class="image-container">
                        <img src="https://images.unsplash.com/photo-1581428982868-e410dd047a90?w=800" alt="Журнальный стол">
                    </div>
                    <div class="card-info">
                        <div class="card-category">Декор / Столы</div>
                        <h3 class="card-title">Стол журнальный MARBLE</h3>
                        <div class="card-bottom">
                            <div class="card-price">420 BYN</div>
                            <a href="#" class="card-link" onclick="alert('Эта карточка находится в разработке'); return false;">Подробнее</a>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

</body>
</html>
